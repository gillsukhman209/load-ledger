<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Relay Load Ledger</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Relay Load Ledger</h1>
        <p id="connectionStatus">Connecting to local Firebase backend...</p>
      </div>
      <div class="topbar-actions">
        <button id="connectGmailButton" type="button">Connect Gmail</button>
        <button id="syncGmailButton" type="button">Sync Gmail</button>
        <button id="clearGmailButton" type="button">Clear Gmail Imports</button>
        <button id="refreshButton" type="button">Refresh</button>
        <button id="settingsButton" type="button" aria-expanded="false" aria-controls="settingsPanel">Settings</button>
      </div>
    </header>

    <main>
      <section class="settings-panel" id="settingsPanel" hidden>
        <label>
          Backend URL
          <input id="backendUrlInput" type="url" autocomplete="off">
        </label>
        <label>
          API key
          <input id="apiKeyInput" type="password" autocomplete="off">
        </label>
        <label>
          Gmail lookback days
          <input id="gmailLookbackDaysInput" type="number" min="1" max="3650" step="1">
        </label>
        <label>
          Max Gmail emails
          <input id="gmailMaxResultsInput" type="number" min="50" max="5000" step="50">
        </label>
        <button id="saveSettingsButton" type="button">Save</button>
      </section>

      <section class="summary-grid" aria-label="Ledger totals">
        <article>
          <span>Total loads</span>
          <strong id="totalLoads">0</strong>
        </article>
        <article>
          <span>Total payout</span>
          <strong id="totalPayout">$0.00</strong>
        </article>
        <article>
          <span>Unpaid payout</span>
          <strong id="unpaidPayout">$0.00</strong>
        </article>
        <article>
          <span>Needs review</span>
          <strong id="needsReview">0</strong>
        </article>
        <article>
          <span>Gmail missing from Trips</span>
          <strong id="gmailMissing">0</strong>
        </article>
      </section>

      <section class="filter-shell" aria-label="Filters">
        <button id="filtersButton" class="section-toggle" type="button" aria-expanded="false" aria-controls="filtersPanel">Show filters</button>
        <div class="controls" id="filtersPanel" hidden>
          <label>
            Search
            <input id="searchInput" type="search" placeholder="Trip, driver, city, status">
          </label>
          <label>
            Driver
            <select id="driverFilter">
              <option value="">All drivers</option>
            </select>
          </label>
          <label>
            Status
            <select id="statusFilter">
              <option value="">All statuses</option>
            </select>
          </label>
          <label>
            Invoice
            <select id="invoiceFilter">
              <option value="">All invoices</option>
              <option value="Unmatched">Unmatched</option>
              <option value="Matched">Matched</option>
              <option value="Disputed">Disputed</option>
              <option value="Paid">Paid</option>
            </select>
          </label>
          <label>
            Source
            <select id="sourceFilter">
              <option value="">All sources</option>
              <option value="trips">Trips</option>
              <option value="gmail">Gmail</option>
              <option value="missing">Gmail missing from Trips</option>
            </select>
          </label>
          <label>
            Sort by
            <select id="sortField">
              <option value="start">Start date</option>
              <option value="end">End date</option>
              <option value="payout">Payout</option>
              <option value="driver">Driver</option>
              <option value="trip">Trip ID</option>
              <option value="pickup">Pickup</option>
              <option value="dropoff">Dropoff</option>
              <option value="status">Status</option>
              <option value="source">Source</option>
              <option value="invoice">Invoice</option>
            </select>
          </label>
          <label>
            Direction
            <select id="sortDirection">
              <option value="desc">Descending</option>
              <option value="asc">Ascending</option>
            </select>
          </label>
        </div>
      </section>

      <section class="workbench">
        <section class="table-wrap" aria-label="Loads">
          <table>
            <thead>
              <tr>
                <th><button class="sort-header" data-sort="trip" type="button">Trip ID</button></th>
                <th><button class="sort-header" data-sort="driver" type="button">Driver</button></th>
                <th><button class="sort-header" data-sort="pickup" type="button">Pickup</button></th>
                <th><button class="sort-header" data-sort="dropoff" type="button">Dropoff</button></th>
                <th><button class="sort-header" data-sort="start" type="button">Start</button></th>
                <th><button class="sort-header" data-sort="payout" type="button">Payout</button></th>
                <th><button class="sort-header" data-sort="status" type="button">Status</button></th>
                <th><button class="sort-header" data-sort="source" type="button">Source</button></th>
                <th><button class="sort-header" data-sort="invoice" type="button">Invoice</button></th>
                <th>Notes</th>
              </tr>
            </thead>
            <tbody id="loadsBody"></tbody>
          </table>
          <div id="emptyState" class="empty-state" hidden>No loads match the current filters.</div>
        </section>
      </section>
    </main>

    <template id="loadRowTemplate">
      <tr>
        <td data-field="trip"></td>
        <td data-field="driver"></td>
        <td data-field="origin"></td>
        <td data-field="destination"></td>
        <td data-field="start"></td>
        <td data-field="payout"></td>
        <td data-field="status"></td>
        <td data-field="source"></td>
        <td>
          <select data-action="invoice">
            <option>Unmatched</option>
            <option>Matched</option>
            <option>Disputed</option>
            <option>Paid</option>
          </select>
        </td>
        <td>
          <button class="note-button" data-action="show-note" type="button">Note</button>
          <input data-action="notes" type="text" placeholder="Add note" hidden>
        </td>
      </tr>
    </template>

    <script src="app.js"></script>
  </body>
</html>
